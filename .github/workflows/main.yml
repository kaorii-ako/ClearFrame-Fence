name: Build
on: [push]
jobs:
    build:
      runs-on: windows-latest]
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
               node-version: 20
        - run: npm install
        - run: npx electron-builder --win nsis
          env:
               GH_TOKEN: ${{ secrets.GITHUB_TOKEN }
        - uses: actions/upload-artifact@v4
          with:
               name: installer
               path: dist/*.exe
